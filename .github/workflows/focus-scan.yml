name: Focus Scan

on:
  schedule:
    # 6:30 UTC = 7:30 Europe/Paris (été) / 6:30 (hiver)
    # 6:30 UTC = 18:30 Pacific/Auckland (si tu veux l'heure NZ, passer à 18:30 UTC)
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: cloud-scanner/requirements.txt

      - name: Install deps
        run: pip install -r cloud-scanner/requirements.txt

      - name: Run scanner
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN_GIST }}
          GIST_ID:               ${{ secrets.GIST_ID }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python cloud-scanner/scan.py
