name: Focus Scan

on:
  schedule:
    # Morning : scan IA + push "brief" (~07:00 NZDT = 19:00 UTC ; été NZ).
    - cron: '0 19 * * *'
    # Evening : push uniquement "clôture" (~21:00 NZDT = 09:00 UTC).
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (morning | evening | scan)'
        required: false
        default: 'scan'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: cloud-scanner/requirements.txt

      - name: Install deps
        run: pip install -r cloud-scanner/requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 19 * * *" ]; then
              echo "mode=morning" >> "$GITHUB_OUTPUT"
            else
              echo "mode=evening" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "mode=${{ github.event.inputs.mode || 'scan' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN_GIST }}
          GIST_ID:               ${{ secrets.GIST_ID }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:         ${{ secrets.VAPID_SUBJECT }}
          RUN_MODE:              ${{ steps.mode.outputs.mode }}
        run: python cloud-scanner/scan.py
